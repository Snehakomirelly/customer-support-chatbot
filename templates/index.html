<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chat</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- 🌙 DARK MODE BUTTON -->
<button onclick="toggleDarkMode()" class="dark-toggle">
    🌙 Dark Mode
</button>

<!-- USERNAME POPUP -->
<div id="namePopup" class="popup">
    <div class="popup-box">
        <h2>Enter Your Name</h2>
        <input type="text" id="usernameInput" placeholder="Your name">
        <button onclick="saveName()">Start Chat</button>
    </div>
</div>

<div class="chat-container">

    <h1>💬 Customer Support Chat</h1>

    <!-- THEME -->
    <div class="theme-section">
        <select onchange="changeTheme(this.value)">
            <option value="default">Default Theme</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="pink">Pink</option>
        </select>
    </div>

    <!-- STATUS -->
    <div class="status-bar">
        <span class="online-dot"></span>
        <span>Support Agent Online</span>
    </div>

    <!-- CHAT BOX -->
    <div id="chat-box"></div>

    <!-- INPUT -->
    <div class="input-section">
        <input type="text" id="message" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
        <button onclick="startVoice()">🎤</button>
    </div>

    <!-- EMOJI -->
    <div class="emoji-section">
        <button onclick="addEmoji('😀')">😀</button>
        <button onclick="addEmoji('👍')">👍</button>
        <button onclick="addEmoji('❤️')">❤️</button>
    </div>

    <!-- ACTION -->
    <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
    <button class="download-btn" onclick="downloadChat()">Download Chat</button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
